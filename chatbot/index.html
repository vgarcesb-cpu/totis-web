<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta Online - Totis Servicios</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #111;
      min-height: 100vh;
    }

    /* ── ICONO FLOTANTE DERECHO ── */
    #chatBtn {
      position: fixed;
      right: 24px;
      bottom: 32px;
      width: 62px;
      height: 62px;
      background: linear-gradient(135deg, #c9a227, #f0c040);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(201,162,39,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .2s;
      z-index: 1000;
    }
    #chatBtn:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(201,162,39,0.8); }
    #chatBtn svg { width: 30px; height: 30px; fill: #111; }

    /* ── PANEL FORMULARIO ── */
    #chatPanel {
      display: none;
      position: fixed;
      right: 24px;
      bottom: 108px;
      width: 340px;
      background: #1a1a1a;
      border: 1px solid #c9a227;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.75);
      z-index: 999;
      overflow: hidden;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #chatPanel.open { display: block; }

    .panel-header {
      background: linear-gradient(135deg, #c9a227, #f0c040);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header span { font-weight: 700; font-size: 15px; color: #111; letter-spacing: .4px; }
    .panel-header button { background: none; border: none; cursor: pointer; font-size: 20px; color: #111; line-height: 1; }

    .panel-body { padding: 18px 18px 20px; }

    .panel-body label {
      display: block;
      font-size: 11px;
      color: #c9a227;
      font-weight: 700;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .panel-body input,
    .panel-body textarea {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
      color: #eee;
      font-size: 14px;
      padding: 10px 12px;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .panel-body input:focus,
    .panel-body textarea:focus { border-color: #c9a227; }
    .panel-body textarea { resize: none; height: 78px; }

    #sendBtn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #c9a227, #f0c040);
      border: none;
      border-radius: 8px;
      color: #111;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: .4px;
    }
    #sendBtn:hover { opacity: .9; transform: scale(1.02); }
    #sendBtn:active { transform: scale(.98); }
    #sendBtn:disabled { opacity: .6; cursor: not-allowed; }

    /* Mensaje éxito */
    #successMsg {
      display: none;
      text-align: center;
      padding: 32px 20px 28px;
    }
    #successMsg .check { font-size: 52px; margin-bottom: 14px; }
    #successMsg h3 { color: #c9a227; font-size: 17px; margin-bottom: 10px; }
    #successMsg p { color: #aaa; font-size: 14px; line-height: 1.6; }

    /* Responsive móvil */
    @media (max-width: 400px) {
      #chatPanel { right: 10px; width: calc(100vw - 20px); }
      #chatBtn   { right: 14px; bottom: 20px; }
    }
  </style>
</head>
<body>

  <!-- Icono flotante derecho -->
  <button id="chatBtn" title="Consulta Online" onclick="togglePanel()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
  </button>

  <!-- Panel formulario -->
  <div id="chatPanel">
    <div class="panel-header">
      <span>💬 Consulta Online — Totis</span>
      <button onclick="togglePanel()" title="Cerrar">✕</button>
    </div>

    <!-- Formulario -->
    <div class="panel-body" id="formArea">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Tu nombre completo" maxlength="80" />

      <label>Email</label>
      <input type="email" id="email" placeholder="correo@ejemplo.com" maxlength="100" />

      <label>Teléfono</label>
      <input type="tel" id="telefono" placeholder="+56 9 XXXX XXXX" maxlength="20" />

      <label>Tu consulta</label>
      <textarea id="consulta" placeholder="Escribe aquí tu consulta o solicitud de servicio..."></textarea>

      <button id="sendBtn" onclick="enviarConsulta()">Enviar Consulta</button>
    </div>

    <!-- Mensaje de éxito -->
    <div id="successMsg">
      <div class="check">✅</div>
      <h3>¡Mensaje recibido!</h3>
      <p>Contactaremos a la brevedad.<br>¡Gracias por consultar!</p>
    </div>
  </div>

  <script>
    function togglePanel() {
      const panel = document.getElementById('chatPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) {
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
      }
    }

    function sanitize(str) {
      return str.replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));
    }

    function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

    let lastSend = 0;

    function enviarConsulta() {
      const now = Date.now();
      if (now - lastSend < 30000) {
        alert('Por favor espera 30 segundos antes de enviar otra consulta.');
        return;
      }
      const nombre   = sanitize(document.getElementById('nombre').value.trim());
      const email    = sanitize(document.getElementById('email').value.trim());
      const telefono = sanitize(document.getElementById('telefono').value.trim());
      const consulta = sanitize(document.getElementById('consulta').value.trim());

      if (!nombre)            { alert('Por favor ingresa tu nombre.');       return; }
      if (!validEmail(email)) { alert('Por favor ingresa un email válido.'); return; }
      if (!consulta)          { alert('Por favor escribe tu consulta.');      return; }

      const btn = document.getElementById('sendBtn');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      const serviceID  = 'service_wpd3adq';
      const templateID = 'template_chatbot_totis';
      const publicKey  = 'TU_PUBLIC_KEY';

      const params = {
        to_name:    'Victor Garces B.',
        from_name:  nombre,
        from_email: email,
        phone:      telefono || 'No indicado',
        message:    consulta,
        reply_to:   email
      };

      if (typeof emailjs !== 'undefined' && publicKey !== 'TU_PUBLIC_KEY') {
        emailjs.send(serviceID, templateID, params, publicKey)
          .then(() => mostrarExito())
          .catch(() => mostrarExito());
      } else {
        const leads = JSON.parse(localStorage.getItem('totis_leads') || '[]');
        leads.push({ nombre, email, telefono, consulta, fecha: new Date().toISOString() });
        localStorage.setItem('totis_leads', JSON.stringify(leads));
        setTimeout(mostrarExito, 700);
      }
      lastSend = now;
    }

    function mostrarExito() {
      document.getElementById('formArea').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      ['nombre','email','telefono','consulta'].forEach(id => document.getElementById(id).value = '');
      const btn = document.getElementById('sendBtn');
      btn.textContent = 'Enviar Consulta';
      btn.disabled = false;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    if (typeof emailjs !== 'undefined') {
      emailjs.init({ publicKey: 'TU_PUBLIC_KEY' });
    }
  </script>
</body>
</html>
