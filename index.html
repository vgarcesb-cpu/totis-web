<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toti's - Systems Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663560246812/dQaKbIIJnaeUHnII.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background-color: #000;
        }

        /* Overlay suave para mejorar legibilidad */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            z-index: 1;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo TOTI'S - CON NEON ROSADO */
        .logo-section {
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            margin-bottom: 5px;
            animation: glowPink 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.8)) 
                    drop-shadow(0 0 30px rgba(212, 175, 55, 0.4))
                    drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            text-shadow: 
                0 0 10px rgba(255, 20, 147, 0.6),
                0 0 20px rgba(255, 20, 147, 0.4),
                0 0 30px rgba(212, 175, 55, 0.3);
        }

        @keyframes glowPink {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(255, 20, 147, 0.6),
                    0 0 20px rgba(255, 20, 147, 0.4),
                    0 0 30px rgba(212, 175, 55, 0.3);
                filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.8)) 
                        drop-shadow(0 0 30px rgba(212, 175, 55, 0.4))
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            }
            50% {
                text-shadow: 
                    0 0 20px rgba(255, 20, 147, 0.9),
                    0 0 40px rgba(255, 20, 147, 0.6),
                    0 0 60px rgba(212, 175, 55, 0.5);
                filter: drop-shadow(0 0 25px rgba(255, 20, 147, 1)) 
                        drop-shadow(0 0 50px rgba(212, 175, 55, 0.6))
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            }
        }

        .logo-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 30px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6))
                    drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.3));
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
        }

        /* Texto principal - CON NEON ROSADO */
        .main-text {
            margin-bottom: 40px;
        }

        .main-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 15px;
            letter-spacing: 1px;
            filter: drop-shadow(0 0 12px rgba(255, 20, 147, 0.7))
                    drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            animation: glowText 2s ease-in-out infinite;
        }

        @keyframes glowText {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
                filter: drop-shadow(0 0 12px rgba(255, 20, 147, 0.7))
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            }
            50% {
                text-shadow: 0 0 30px rgba(255, 20, 147, 0.8);
                filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.9))
                        drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
            }
        }

        .main-text p {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 10px;
            line-height: 1.6;
            letter-spacing: 1px;
            font-weight: 500;
            filter: drop-shadow(0 0 8px rgba(255, 20, 147, 0.5))
                    drop-shadow(1px 1px 3px rgba(0, 0, 0, 0.3));
            text-shadow: 0 0 12px rgba(255, 20, 147, 0.4);
        }

        /* Espaciador flexible */
        .spacer {
            flex-grow: 1;
        }

        /* Contenedor de iconos 3D - ABAJO CON NEON ROSADO */
        .icons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .icon-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.2) 0%, rgba(212, 175, 55, 0.1) 100%);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #d4af37;
            box-shadow: 
                0 8px 16px rgba(0, 0, 0, 0.4),
                0 0 15px rgba(255, 20, 147, 0.6),
                0 0 25px rgba(212, 175, 55, 0.3),
                inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.1);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .icon-button:hover {
            transform: translateY(-8px) scale(1.15);
            box-shadow: 
                0 12px 24px rgba(0, 0, 0, 0.5),
                0 0 25px rgba(255, 20, 147, 0.9),
                0 0 40px rgba(212, 175, 55, 0.5),
                inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.15);
            color: #ff1493;
        }

        .icon-button:active {
            transform: translateY(-4px) scale(1.1);
        }

        /* Efecto de brillo 3D */
        .icon-button::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 30%;
            height: 30%;
            background: rgba(255, 20, 147, 0.4);
            border-radius: 50%;
            filter: blur(4px);
        }

        /* Efecto de sombra 3D */
        .icon-button::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 40%;
            height: 40%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            filter: blur(6px);
        }

        /* Modal de Advertencia */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(8px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.98) 0%, rgba(40, 20, 60, 0.98) 100%);
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 
                        0 0 30px rgba(255, 20, 147, 0.5),
                        0 0 40px rgba(212, 175, 55, 0.3);
            animation: slideIn 0.3s ease;
            border: 2px solid #d4af37;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .warning-icon {
            font-size: 60px;
            color: #ff4444;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            color: #d4af37;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.5));
        }

        .modal p {
            color: #d4af37;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.4);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 12px;
            text-shadow: 0 0 8px rgba(255, 20, 147, 0.4);
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #d4af37;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6),
                        0 0 10px rgba(212, 175, 55, 0.4);
            border-color: #ff1493;
        }

        .form-group input::placeholder {
            color: rgba(212, 175, 55, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-register {
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.3) 0%, rgba(212, 175, 55, 0.2) 100%);
            color: #d4af37;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
        }

        .btn-register:hover {
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.8),
                        0 0 15px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
            color: #ff1493;
        }

        .btn-cancel {
            background: transparent;
            color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .btn-cancel:hover {
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            color: #ff1493;
        }

        .close {
            color: #d4af37;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.4);
        }

        .close:hover {
            color: #ff1493;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.8);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #d4af37;
            font-size: 12px;
            opacity: 0.7;
            text-shadow: 0 0 8px rgba(255, 20, 147, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 48px;
            }

            .logo-subtitle {
                font-size: 18px;
            }

            .main-text h2 {
                font-size: 24px;
            }

            .main-text p {
                font-size: 14px;
            }

            .icon-button {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-text">TOTI'S®</div>
            <div class="logo-subtitle">Diseño en Elegancia</div>
        </div>

        <!-- Texto Principal -->
        <div class="main-text">
            <h2>Systems Developer</h2>
            <p>Troubleshooting Assistance</p>
            <p>Full Stack</p>
        </div>

        <!-- Espaciador -->
        <div class="spacer"></div>

        <!-- Iconos 3D -->
        <div class="icons-container">
            <button class="icon-button" onclick="handleIconClick('facebook')" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </button>
            <button class="icon-button" onclick="handleIconClick('whatsapp')" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </button>
            <button class="icon-button" onclick="handleIconClick('instagram')" title="Instagram">
                <i class="fab fa-instagram"></i>
            </button>
            <button class="icon-button" onclick="handleIconClick('vip')" title="VIP Access">
                <i class="fas fa-crown"></i>
            </button>
        </div>
    </div>

    <!-- Modal de Advertencia -->
    <div id="warningModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="warning-icon">⚠️</div>
            <h2>Advertencia de Zona Protegida</h2>
            <p>Derechos Reservados Toti's</p>
            <p>Para acceder a esta zona, debes completar tu registro.</p>

            <form id="registrationForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="fullName">Nombre Completo *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Celular / ID *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+56 9 XXXX XXXX" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-register">Registrarse y Acceder</button>
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2024 Toti's - Derechos Reservados
    </div>

    <script>
        function handleIconClick(platform) {
            switch(platform) {
                case 'facebook':
                    window.open('https://www.facebook.com/tu-pagina', '_blank');
                    break;
                case 'whatsapp':
                    window.open('https://wa.me/56912345678', '_blank');
                    break;
                case 'instagram':
                    window.open('https://www.instagram.com/tu-usuario', '_blank');
                    break;
                case 'vip':
                    document.getElementById('warningModal').style.display = 'block';
                    break;
            }
        }

        function closeModal() {
            document.getElementById('warningModal').style.display = 'none';
        }

        function handleSubmit(event) {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            if (fullName && email && phone) {
                alert(`¡Gracias ${fullName}! Tu registro ha sido recibido.\nNos contactaremos a ${email}`);
                closeModal();
                document.getElementById('registrationForm').reset();
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('warningModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
