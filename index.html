<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toti's - Systems Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-image: url('https://raw.githubusercontent.com/vgarcesb-cpu/totis-web/main/images/_(2 )-UPSCALED.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background-color: #000;
        }

        /* Overlay suave para mejorar legibilidad */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            z-index: 1;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo TOTI'S */
        .logo-section {
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            letter-spacing: 3px;
            margin-bottom: 5px;
            animation: glow 3s ease-in-out infinite;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            }
            50% {
                text-shadow: 0 0 50px rgba(212, 175, 55, 0.6);
            }
        }

        .logo-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #d4af37;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 30px;
            text-transform: uppercase;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.3));
        }

        /* Texto principal */
        .main-text {
            margin-bottom: 40px;
        }

        .main-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 15px;
            letter-spacing: 1px;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        }

        .main-text p {
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 10px;
            line-height: 1.6;
            letter-spacing: 1px;
            font-weight: 500;
            filter: drop-shadow(1px 1px 3px rgba(0, 0, 0, 0.3));
        }

        /* Espaciador flexible */
        .spacer {
            flex-grow: 1;
        }

        /* Contenedor de iconos 3D - ABAJO */
        .icons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .icon-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3) 0%, rgba(212, 175, 55, 0.1) 100%);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 16px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(212, 175, 55, 0.4),
                inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.1);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .icon-button:hover {
            transform: translateY(-8px) scale(1.15);
            box-shadow: 
                0 12px 24px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(212, 175, 55, 0.6),
                inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.15);
        }

        .icon-button:active {
            transform: translateY(-4px) scale(1.1);
        }

        /* Efecto de brillo 3D */
        .icon-button::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(4px);
        }

        /* Efecto de sombra 3D */
        .icon-button::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 40%;
            height: 40%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            filter: blur(6px);
        }

        /* Modal de Advertencia */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(8px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.98) 0%, rgba(40, 20, 60, 0.98) 100%);
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(212, 175, 55, 0.4);
            animation: slideIn 0.3s ease;
            border: 2px solid #d4af37;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .warning-icon {
            font-size: 60px;
            color: #ff4444;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal h2 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 24px;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        .modal p {
            color: #d4af37;
            margin-bottom: 12px;
            line-height: 1.5;
            font-size: 13px;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #d4af37;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            border: 2px solid #d4af37;
            border-radius: 6px;
            background: rgba(212, 175, 55, 0.08);
            color: #d4af37;
            font-size: 12px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .form-group input::placeholder {
            color: rgba(212, 175, 55, 0.5);
        }

        /* Botones del modal */
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 8px 16px;
            border: 2px solid #d4af37;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
        }

        .modal-btn-register {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #000;
        }

        .modal-btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
        }

        .modal-btn-cancel {
            background: transparent;
            color: #d4af37;
        }

        .modal-btn-cancel:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            color: rgba(212, 175, 55, 0.7);
            font-size: 12px;
            letter-spacing: 1px;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.5));
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo-text {
                font-size: 48px;
            }

            .logo-subtitle {
                font-size: 18px;
            }

            .main-text h2 {
                font-size: 24px;
            }

            .main-text p {
                font-size: 16px;
            }

            .icon-button {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }

            .icons-container {
                gap: 15px;
                margin-bottom: 20px;
            }

            .modal-content {
                margin: 20% auto;
                padding: 20px 15px;
                width: 95%;
                max-height: 80vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo TOTI'S -->
        <div class="logo-section">
            <div class="logo-text">TOTI'S®</div>
            <div class="logo-subtitle">Diseño en Elegancia</div>
        </div>

        <!-- Texto Principal -->
        <div class="main-text">
            <h2>Systems Developer</h2>
            <p>Troubleshooting Assistance</p>
            <p>Full Stack</p>
        </div>

        <!-- Espaciador -->
        <div class="spacer"></div>

        <!-- Iconos 3D de Redes Sociales - ABAJO -->
        <div class="icons-container">
            <!-- Facebook -->
            <button class="icon-button" onclick="showWarning('facebook')" title="Facebook">
                f
            </button>

            <!-- WhatsApp -->
            <button class="icon-button" onclick="showWarning('whatsapp')" title="WhatsApp">
                💬
            </button>

            <!-- Instagram -->
            <button class="icon-button" onclick="showWarning('instagram')" title="Instagram">
                📷
            </button>

            <!-- VIP / Email -->
            <button class="icon-button" onclick="showWarning('vip')" title="VIP - Email">
                👑
            </button>
        </div>

        <footer>© 2024 Toti's - Derechos Reservados</footer>
    </div>

    <!-- Modal de Advertencia y Registro -->
    <div id="warningModal" class="modal">
        <div class="modal-content">
            <div class="warning-icon">⚠️</div>
            <h2>Advertencia de Zona Protegida</h2>
            <p>Derechos Reservados Toti's</p>
            <p style="font-size: 12px; margin-bottom: 25px;">Para acceder a esta zona, debes completar tu registro.</p>

            <!-- Formulario de Registro -->
            <form id="registrationForm" onsubmit="handleRegistration(event)">
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="celular">Celular / ID *</label>
                    <input type="tel" id="celular" name="celular" placeholder="+56 9 XXXX XXXX" required>
                </div>

                <div class="modal-buttons">
                    <button type="submit" class="modal-btn modal-btn-register">
                        Registrarse y Continuar
                    </button>
                    <button type="button" class="modal-btn modal-btn-cancel" onclick="closeWarning()">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Variable global para guardar el tipo de contacto
        let currentContactType = '';
        let userNombre = '';

        function showWarning(type) {
            currentContactType = type;
            const modal = document.getElementById('warningModal');
            modal.style.display = 'block';
            
            // Limpiar formulario
            document.getElementById('registrationForm').reset();
        }

        function closeWarning() {
            const modal = document.getElementById('warningModal');
            modal.style.display = 'none';
            currentContactType = '';
        }

        function handleRegistration(event) {
            event.preventDefault();

            // Obtener datos del formulario
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const celular = document.getElementById('celular').value;

            // Validar que los campos no estén vacíos
            if (!nombre || !email || !celular) {
                alert('Por favor completa todos los campos');
                return;
            }

            // Validar email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Por favor ingresa un email válido');
                return;
            }

            // Validar celular (al menos 9 dígitos)
            const celularRegex = /\d{9,}/;
            if (!celularRegex.test(celular.replace(/\D/g, ''))) {
                alert('Por favor ingresa un celular válido');
                return;
            }

            // Guardar datos en localStorage
            userNombre = nombre;
            localStorage.setItem('userRegistration', JSON.stringify({
                nombre: nombre,
                email: email,
                celular: celular,
                timestamp: new Date().toISOString()
            }));

            // Redirigir según el tipo de contacto
            redirectToContact(currentContactType, nombre, email, celular);

            // Cerrar modal
            closeWarning();
        }

        function redirectToContact(type, nombre, email, celular) {
            switch(type) {
                case 'facebook':
                    // Reemplaza con tu URL de Facebook
                    window.open('https://www.facebook.com/tu-pagina', '_blank');
                    break;

                case 'whatsapp':
                    // Reemplaza con tu número de WhatsApp
                    window.open('https://wa.me/56934072459', '_blank');
                    break;

                case 'instagram':
                    // Reemplaza con tu usuario de Instagram
                    window.open('https://www.instagram.com/tu-usuario', '_blank');
                    break;

                case 'vip':
                    // Enviar email con los datos del registro
                    const asunto = 'Solicitud VIP desde Toti\'s';
                    const cuerpo = `Hola,%0A%0AMi nombre es ${encodeURIComponent(nombre)}.%0A%0AMe gustaría información sobre servicios VIP.%0A%0aMis datos:%0aNombre: ${encodeURIComponent(nombre)}%0aEmail: ${email}%0aCelular: ${encodeURIComponent(celular)}%0a%0aAtentamente,%0a${encodeURIComponent(nombre)}`;
                    window.location.href = `mailto:vgarcesb@gmail.com?subject=${encodeURIComponent(asunto)}&body=${cuerpo}`;
                    break;
            }
        }

        // Cerrar modal si se hace clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('warningModal');
            if (event.target === modal) {
                closeWarning();
            }
        }

        // Cerrar modal con tecla ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeWarning();
            }
        });
    </script>
</body>
</html>
